{% load clinic_filters %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Tibbiy yozuv</title>
    <style>
        @media print { .no-print { display: none !important; } body { margin: 0; padding: 20px; } }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; color: #1a1a2e; }
        .notes-card { border: 2px solid #1a1a2e; border-radius: 12px; padding: 32px; }
        .section-title { font-size: 12px; text-transform: uppercase; color: #718096; letter-spacing: 1px; margin: 20px 0 10px; font-weight: 700; }
        .section-title:first-child { margin-top: 0; }
        .section-content { font-size: 14px; line-height: 1.7; padding: 12px 16px; background: #f7fafc; border-radius: 8px; margin-bottom: 12px; white-space: pre-wrap; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; display: block; }
        .btn-dark { background: #1a1a2e; color: #fff; }
        .btn-light { background: #e2e8f0; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="notes-card">
        {% if visit.problem %}
        <div class="section-title">Muammo / Shikoyat</div>
        <div class="section-content">{{ visit.problem }}</div>
        {% endif %}

        {% if visit.solution %}
        <div class="section-title">Yechim / Retsept</div>
        <div class="section-content">{{ visit.solution }}</div>
        {% endif %}

        {% if visit.notes %}
        <div class="section-title">Qo'shimcha izohlar</div>
        <div class="section-content">{{ visit.notes }}</div>
        {% endif %}
    </div>

    <div class="btn-row no-print">
        <button class="btn btn-dark" onclick="window.print()">Chop etish</button>
        <a class="btn btn-light" href="{% url 'doctor_patient_detail' doctor.pk patient.pk %}">Ortga qaytish</a>
    </div>
</body>
</html>
